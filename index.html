<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>🎅 聖誕老人集合廣場</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Clarity Tracking -->
    <script type="text/javascript">
        try {
            (function (c, l, a, r, i, t, y) {
                c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
                t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/uf1icbsh3d";
                y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
            })(window, document, "clarity", "script", "uf1icbsh3d");
        } catch (e) { console.warn("Clarity load failed", e); }
    </script>
    <style>
        :root {
            --primary: #d42426;
            --bg: #1a1c29;
            --text: #fff;
            --card-bg: rgba(255, 255, 255, 0.1);
            --gold: #ffd700;
        }

        html {
            height: 100%;
            overflow-y: scroll;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            background-image: url('bg.jpg'), linear-gradient(135deg, #1a1c29 0%, #300000 100%);
            background-repeat: no-repeat, no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            color: var(--text);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: filter 0.5s;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: -1;
            transition: background 0.5s;
        }

        /* === 🎵 音樂控制按鈕 === */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        .music-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        /* === 🚪 入場遮罩 === */
        #entry-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
            backdrop-filter: blur(15px);
        }

        .entry-content {
            text-align: center;
            color: white;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--primary);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212, 36, 38, 0.5);
            animation: pulse 2s infinite;
            max-width: 90%;
        }

        #enterBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        /* === 💡 燈箱 === */
        #status-lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #status-lightbox.show {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            max-width: 80%;
            width: 400px;
            text-align: center;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #status-lightbox.show .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* === 🕺 Disco 模式 === */
        .disco-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            mix-blend-mode: overlay;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        body.disco-mode .disco-overlay {
            opacity: 1;
            animation: disco-flash 0.5s infinite;
        }

        @keyframes disco-flash {
            0% { background-color: rgba(255, 0, 0, 0.3); }
            33% { background-color: rgba(0, 255, 0, 0.3); }
            66% { background-color: rgba(0, 0, 255, 0.3); }
            100% { background-color: rgba(255, 0, 255, 0.3); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 36, 38, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(212, 36, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 36, 38, 0); }
        }

        /* === 📱 頁面切換控制 === */
        .view-section {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .view-section.active {
            display: flex;
        }

        /* === 🖥️ 廣場顯示區 === */
        #plaza-view h1 {
            margin-top: 20px;
            font-size: 2.5rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 60;
            text-align: center;
        }

        .qr-card {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            z-index: 60;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .qr-card img {
            width: 150px;
            height: 150px;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
        }

        .qr-card p {
            margin: 10px 0 0;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-group {
            margin-bottom: 70px;
            z-index: 60;
            display: flex;
            gap: 15px;
        }

        button.action-btn {
            background: #8e44ad;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(142, 68, 173, 0.4);
            transition: transform 0.2s;
        }

        .plaza-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 60px 30px;
            width: 100%;
            max-width: 95vw;
            padding-bottom: 150px;
            z-index: 1;
        }

        /* === 📱 手機上傳區 === */
        #upload-view {
            justify-content: center;
            min-height: 90vh;
        }

        .mobile-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 30px 20px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .mobile-card h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.6rem;
        }

        .mobile-card input[type="text"] {
            width: 90%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border 0.3s;
            box-sizing: border-box;
        }

        .file-upload-btn {
            display: block;
            width: 90%;
            margin: 10px auto;
            padding: 15px;
            background: #f0f2f5;
            color: #555;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            border: 2px dashed #ccc;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        button#uploadBtn {
            width: 90%;
            padding: 15px;
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 36, 38, 0.3);
            transition: transform 0.1s;
        }

        /* === 卡片基本樣式 === */
        .santa-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.5s ease-out;
            position: relative;
            transition: transform 0.3s;
            cursor: pointer;
            width: 120px;
            margin: 10px;
            -webkit-tap-highlight-color: transparent;
            contain: layout style;
        }

        .santa-card:active {
            transform: scale(0.9);
        }

        .santa-name {
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 10px;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .click-badge {
            background: #f1c40f;
            color: #333;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            opacity: 0.9;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .santa-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 10px;
            transition: transform 0.3s;
        }

        .santa-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            background: #333;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transform: translateZ(0);
        }

        /* === 飾品系統 === */
        .accessory {
            position: absolute;
            pointer-events: none;
            z-index: 3;
        }

        .accessory.antlers {
            width: 80px;
            height: 40px;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
        }

        .accessory.antlers::before,
        .accessory.antlers::after {
            content: '';
            position: absolute;
            top: 0;
            width: 8px;
            height: 30px;
            background: #8d6e63;
            border-radius: 5px;
        }

        .accessory.antlers::before { left: 15px; transform: rotate(-30deg); }
        .accessory.antlers::after { right: 15px; transform: rotate(30deg); }

        .accessory.antlers .branch {
            position: absolute;
            width: 6px;
            height: 15px;
            background: #8d6e63;
            border-radius: 5px;
        }

        .accessory.antlers .branch.left { left: 10px; top: 10px; transform: rotate(-60deg); }
        .accessory.antlers .branch.right { right: 10px; top: 10px; transform: rotate(60deg); }

        .accessory.halo {
            width: 60px;
            height: 20px;
            border: 4px solid #f1c40f;
            border-radius: 50%;
            top: -30px;
            left: 50%;
            transform: translateX(-50%) rotateX(60deg);
            box-shadow: 0 0 10px #f1c40f, 0 0 20px #f1c40f inset;
            animation: floatHalo 2s ease-in-out infinite;
        }

        @keyframes floatHalo {
            0%, 100% { transform: translateX(-50%) rotateX(60deg) translateY(0); }
            50% { transform: translateX(-50%) rotateX(60deg) translateY(-5px); }
        }

        .accessory.elf {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 50px solid #2ecc71;
            top: -40px;
            left: 50%;
            transform: translateX(-50%) rotate(-10deg);
        }

        .accessory.elf::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -25px;
            width: 10px;
            height: 10px;
            background: #e74c3c;
            border-radius: 50%;
        }

        .santa-card.gold-mode .santa-img {
            border-color: #ffd700 !important;
            box-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700 !important;
            filter: brightness(1.1) contrast(1.1);
        }

        .accessory.crown {
            font-size: 40px;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            text-shadow: 0 0 10px gold;
            animation: bounceCrown 1s infinite alternate;
        }

        @keyframes bounceCrown {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-5px); }
        }

        /* === 帽子樣式 === */
        .css-hat {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            width: 60px;
            height: 35px;
            background: var(--primary);
            border-radius: 50px 50px 0 0;
            z-index: 2;
        }

        .css-hat::after {
            content: '';
            position: absolute;
            top: -12px;
            right: -10px;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
        }

        .css-hat::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 12px;
            background: white;
            border-radius: 10px;
        }

        .has-accessory .css-hat:not(.special) { display: none; }

        .css-hat.special {
            background: var(--gold);
            width: 85px;
            height: 50px;
            top: -30px;
            border-radius: 50px 50px 0 0;
            z-index: 20;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .css-hat.special::before {
            width: 100px;
            height: 16px;
            bottom: -10px;
            background: #fff;
            left: 50%;
            transform: translateX(-50%);
        }

        .css-hat.special::after {
            width: 30px;
            height: 30px;
            top: -15px;
            right: -15px;
            background: #fff;
        }

        .css-hat.special~.santa-img {
            border: 4px solid var(--gold) !important;
            animation: winner-glow 2s infinite alternate;
            z-index: 10;
        }

        @keyframes winner-glow {
            from { box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); border-color: #e6c200; }
            to { box-shadow: 0 0 45px rgba(255, 215, 0, 1); border-color: #fff; }
        }

        /* === 互動動畫 === */
        @keyframes dance-sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
        @keyframes dance-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes dance-wobble {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg) translateY(-3px); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(2deg) translateY(-3px); }
            100% { transform: rotate(0deg); }
        }

        .dance-1 { animation: dance-sway 3s infinite ease-in-out alternate; }
        .dance-2 { animation: dance-bounce 2s infinite ease-in-out; }
        .dance-3 { animation: dance-wobble 2.5s infinite linear; }

        body.disco-mode .dance-1, body.disco-mode .dance-2, body.disco-mode .dance-3 { animation-duration: 0.5s !important; }

        @keyframes run-away-right {
            0% { transform: translateX(0) scale(1) skewX(0); }
            20% { transform: translateX(-20px) scale(1.1) skewX(-10deg); }
            100% { transform: translateX(2000px) scale(0.8) skewX(45deg); opacity: 0; }
        }

        @keyframes drop-from-sky {
            0% { transform: translateY(-100vh); opacity: 0; }
            60% { transform: translateY(10px); opacity: 1; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes shake-panic {
            0%, 100% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        .mode-run-away { animation: run-away-right 0.8s ease-in forwards !important; z-index: 999; }
        .mode-come-back { animation: drop-from-sky 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important; }
        .mode-introvert-shake .santa-wrapper { animation: shake-panic 0.5s infinite !important; }

        /* 💬 氣泡 */
        @keyframes bubbleCycle {
            0%, 85%, 100% { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(15px); }
            5%, 80% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
            25%, 65% { transform: translateX(-50%) scale(1.05) translateY(-3px); }
            45% { transform: translateX(-50%) scale(1) translateY(0); }
        }

        .speech-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #333;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 30;
            opacity: 0;
            animation: bubbleCycle 13s infinite;
            pointer-events: auto;
            cursor: zoom-in;
            transition: all 0.3s;
            will-change: opacity, transform;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: inherit transparent transparent transparent;
        }

        .bubble-shout, .bubble-introvert, .bubble-poke { opacity: 1 !important; animation: none !important; }
        .bubble-shout { background: #ffeb3b !important; color: #d00000 !important; transform: translateX(-50%) scale(1.3) !important; z-index: 100 !important; }
        .bubble-introvert { background: #81ecec !important; color: #0984e3 !important; transform: translateX(-50%) scale(1.1) !important; }
        .bubble-poke { background: #ff7675 !important; color: white !important; transform: translateX(-50%) scale(1.2) !important; }

        /* ❄️ Canvas 雪花層 */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2; /* 位於背景之上，文字之下 */
        }
    </style>
</head>

<body>
    <!-- 🎵 音樂靜音按鈕 -->
    <button id="musicToggle" class="music-btn">🔊</button>

    <!-- 🚪 入場遮罩 -->
    <div id="entry-overlay">
        <div class="entry-content">
            <h1>🎅 聖誕派對準備開始！</h1>
            <p>你準備加入了嗎？</p>
            <br>
            <button id="enterBtn">確定 (開啟音樂 🎵)</button>
        </div>
    </div>

    <!-- 💡 狀態燈箱 -->
    <div id="status-lightbox">
        <div class="lightbox-content">
            <div id="lightbox-text" class="lightbox-text"></div>
            <div id="lightbox-author" class="lightbox-author"></div>
            <button class="lightbox-close">關閉</button>
        </div>
    </div>

    <!-- 🎵 背景音樂 -->
    <audio id="bgm" src="https://sodahsu.github.io/santa-2025/christmas.mp3" loop></audio>

    <div class="disco-overlay"></div>
    <canvas id="snow-canvas"></canvas>

    <!-- 🖥️ 廣場顯示區 -->
    <div id="plaza-view" class="view-section active">
        <h1>🎄 Team Santa Plaza</h1>

        <div class="qr-card">
            <img id="qr-code-img" src="" alt="Scan Me">
            <p>📱 掃描加入廣場 | <a href="#" id="directJoinLink"
                    style="color: var(--primary); text-decoration: underline; font-weight: bold;">點我直接加入</a></p>
        </div>

        <div class="btn-group">
            <button class="action-btn" id="discoBtn">🕺 啟動派對 (Disco!)</button>
        </div>

        <div id="plaza" class="plaza-grid">
            <p style="color:#eee; width: 100%; text-align: center;">正在連線到北極...</p>
        </div>
    </div>

    <!-- 📱 手機上傳區 -->
    <div id="upload-view" class="view-section">
        <div class="mobile-card">
            <h2>🎅 尋找聖誕老人！是你嗎？</h2>

            <div style="margin: 15px 0; color: #555; text-align: left; padding: 0 10px;">
                <p style="font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; color: #333; text-align: center;">
                    簡單兩步驟，讓大家在大螢幕上看見你！</p>
                <p style="margin: 6px 0;">📸 <strong>拍張照</strong> (或選張美照)</p>
                <p style="margin: 6px 0;">✨ <strong>按下發送</strong>，抽取神秘裝備！</p>
            </div>

            <input type="text" id="nameInput" placeholder="輸入你的暱稱 (例如: Andy)" autocomplete="off">
            <input type="text" id="statusInput" maxlength="20" placeholder="輸入你的狀態 (限20字) 可留空" autocomplete="off">

            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <label for="fileInput" class="file-upload-btn">📂 點我選照片 (越清楚越好笑！)</label>

            <div id="preview-container" class="santa-wrapper"
                style="display:none; transform: scale(1.2); margin: 20px;">
                <div class="css-hat"></div>
                <img id="preview-img" class="santa-img" src="">
            </div>

            <button id="uploadBtn">🚀 發射！送我上大螢幕</button>

            <button id="backToPlazaBtn"
                style="width: 90%; padding: 12px; margin-top: 10px; background: #6c757d; color: white; border: none; border-radius: 50px; font-size: 1rem; cursor: pointer;">🏠
                返回廣場</button>
            <p id="statusMsg" style="margin-top: 15px; font-size: 0.9rem; color: #666;"></p>
        </div>
    </div>

    <script>
        // ✅ Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAY9qAImKRnhjqpHfucXNISohWx0iE2zxw",
            authDomain: "santa-2025-99a12.firebaseapp.com",
            projectId: "santa-2025-99a12",
            appId: "1:1033390264974:web:7972cefdd00937b47befdf"
        };

        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            try { firebase.initializeApp(firebaseConfig); } catch (e) { console.error("Firebase init error", e); }
        }

        let db;
        if (typeof firebase !== 'undefined') { db = firebase.firestore(); }

        // === 🎰 扭蛋機率設定 ===
        const GACHA_POOL = [
            { id: 'none', name: '普通聖誕老人', prob: 0.50, icon: '🎅' },
            { id: 'antlers', name: '迷途小麋鹿', prob: 0.30, icon: '🦌' },
            { id: 'elf', name: '派對小精靈', prob: 0.15, icon: '🧝' },
            { id: 'halo', name: '聖誕小天使', prob: 0.04, icon: '👼' },
            { id: 'gold', name: '黃金傳說', prob: 0.01, icon: '👑' }
        ];

        function pullGacha() {
            const rand = Math.random();
            let cumulative = 0;
            for (const item of GACHA_POOL) {
                cumulative += item.prob;
                if (rand < cumulative) return item;
            }
            return GACHA_POOL[0];
        }

        // === 🛡️ 緩衝點讚機制 (優化成本關鍵) ===
        // 原理：當用戶狂點時，先更新畫面，將增量存入 Buffer，每 2 秒同步一次到 Firebase。
        const clickBuffer = new Map(); // key: docId, value: pendingCount
        let isSyncing = false;

        function handleBufferedPoke(docId, cardElement) {
            // 1. 立即更新 UI 回饋
            const badge = cardElement.querySelector('.click-badge');
            const current = parseInt(badge.innerText.split(' ')[1]);
            badge.innerText = `👍 ${current + 1}`;

            // 2. 觸發視覺動畫
            const wrapper = cardElement.querySelector('.santa-wrapper');
            const bubble = cardElement.querySelector('.speech-bubble');
            if (wrapper && !cardElement.classList.contains('busy')) {
                const originalText = bubble.innerText;
                bubble.innerText = "點屁呀～～";
                bubble.classList.add('bubble-poke');
                wrapper.style.transform = "scale(1.1)";
                cardElement.classList.add('busy');
                setTimeout(() => {
                    wrapper.style.transform = "";
                    bubble.innerText = originalText;
                    bubble.classList.remove('bubble-poke');
                    cardElement.classList.remove('busy');
                }, 800);
            }

            // 3. 存入緩衝區
            clickBuffer.set(docId, (clickBuffer.get(docId) || 0) + 1);
        }

        // 定時同步緩衝區到 Firebase
        setInterval(async () => {
            if (clickBuffer.size === 0 || isSyncing || !db) return;
            isSyncing = true;
            const batch = db.batch();
            const entries = Array.from(clickBuffer.entries());
            clickBuffer.clear(); // 先清空，避免同步期間產生的新點擊遺失

            entries.forEach(([id, count]) => {
                const ref = db.collection('santas').doc(id);
                batch.update(ref, { clickCount: firebase.firestore.FieldValue.increment(count) });
            });

            try {
                await batch.commit();
                console.log(`Synced ${entries.length} cards' clicks to Firebase.`);
            } catch (err) {
                console.error("Sync clicks failed:", err);
            } finally {
                isSyncing = false;
            }
        }, 2500);

        // === ❄️ 高效能 Canvas 雪花系統 ===
        class SnowSystem {
            constructor() {
                this.canvas = document.getElementById('snow-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.count = 60;
                window.addEventListener('resize', () => this.resize());
                this.resize();
                this.init();
                this.animate();
            }
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            init() {
                for (let i = 0; i < this.count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 1,
                        vy: Math.random() * 2 + 1,
                        size: Math.random() * 3 + 2,
                        opacity: Math.random() * 0.5 + 0.3
                    });
                }
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = 'white';
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.y > this.canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * this.canvas.width;
                    }
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        // === 🖼️ 優化版 WebP 圖片壓縮 ===
        function compressToWebP(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 120; // 稍微加大解析度
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        // 優先使用 webp，體積更小
                        const dataUrl = canvas.toDataURL('image/webp', 0.6);
                        resolve(dataUrl);
                    };
                };
            });
        }

        // 🔄 畫面切換與事件綁定
        const ui = {
            plazaView: document.getElementById('plaza-view'),
            uploadView: document.getElementById('upload-view'),
            musicBtn: document.getElementById('musicToggle'),
            enterBtn: document.getElementById('enterBtn'),
            uploadBtn: document.getElementById('uploadBtn'),
            fileInput: document.getElementById('fileInput'),
            discoBtn: document.getElementById('discoBtn'),
            lightbox: document.getElementById('status-lightbox'),
            backBtn: document.getElementById('backToPlazaBtn'),
            directJoin: document.getElementById('directJoinLink')
        };

        function switchMode(target) {
            if (target === 'upload') {
                ui.plazaView.classList.remove('active');
                ui.uploadView.classList.add('active');
                history.pushState({ mode: 'upload' }, '', '?mode=upload');
            } else {
                ui.uploadView.classList.remove('active');
                ui.plazaView.classList.add('active');
                history.pushState({ mode: 'plaza' }, '', window.location.pathname);
            }
        }

        // 事件監聽綁定
        ui.musicBtn.onclick = () => {
            const bgm = document.getElementById('bgm');
            bgm.muted = !bgm.muted;
            ui.musicBtn.innerText = bgm.muted ? "🔇" : "🔊";
        };

        ui.enterBtn.onclick = () => {
            const bgm = document.getElementById('bgm');
            bgm.play().catch(e => console.log("Music play blocked"));
            document.getElementById('entry-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('entry-overlay').style.display = 'none', 800);
        };

        ui.directJoin.onclick = (e) => { e.preventDefault(); switchMode('upload'); };
        ui.backBtn.onclick = () => switchMode('plaza');
        ui.discoBtn.onclick = () => triggerDiscoEffect();
        ui.lightbox.onclick = () => {
            ui.lightbox.classList.remove('show');
            setTimeout(() => ui.lightbox.style.display = 'none', 300);
        };

        // 文件選擇與預覽
        ui.fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('preview-img').src = ev.target.result;
                    document.getElementById('preview-container').style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            }
        };

        ui.uploadBtn.onclick = async () => {
            const name = document.getElementById('nameInput').value.trim();
            const status = document.getElementById('statusInput').value.trim();
            const file = ui.fileInput.files[0];
            const msg = document.getElementById('statusMsg');

            if (!name || !file) { msg.innerText = "❌ 請輸入名字並選擇照片！"; return; }

            ui.uploadBtn.disabled = true;
            ui.uploadBtn.innerText = "🎲 抽獎中...";

            try {
                const base64 = await compressToWebP(file);
                const gacha = pullGacha();
                await db.collection('santas').add({
                    name, photoBase64: base64, customStatus: status,
                    accessoryId: gacha.id, clickCount: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                msg.style.color = "#2ecc71";
                msg.innerHTML = `✅ 發送成功！獲得【${gacha.icon} ${gacha.name}】`;
                setTimeout(() => location.href = window.location.pathname, 3000);
            } catch (e) {
                msg.innerText = "錯誤: " + e.message;
                ui.uploadBtn.disabled = false;
            }
        };

        // === 🏛️ 大螢幕高效渲染 ===
        let localDataMap = new Map();
        const danceClasses = ['dance-1', 'dance-2', 'dance-3'];

        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        function generateCardHTML(data, isWinner) {
            const accId = data.accessoryId || 'none';
            let accHTML = '';
            if (accId === 'antlers') accHTML = `<div class="accessory antlers"><div class="branch left"></div><div class="branch right"></div></div>`;
            else if (accId === 'halo') accHTML = `<div class="accessory halo"></div>`;
            else if (accId === 'elf') accHTML = `<div class="accessory elf"></div>`;
            else if (accId === 'gold') accHTML = `<div class="accessory crown">👑</div>`;

            const displayMsg = data.customStatus || ["Ho Ho Ho", "聖誕快樂", "禮物呢?", "想下班"][Math.floor(Math.random() * 4)];
            const bubbleDur = 10 + Math.random() * 10;
            const bubbleDelay = -Math.random() * bubbleDur;

            return `
                <div class="santa-wrapper ${danceClasses[Math.floor(Math.random() * 3)]}" style="animation-delay: -${Math.random() * 2}s;">
                    <div class="speech-bubble" style="animation-duration: ${bubbleDur}s; animation-delay: ${bubbleDelay}s;">${escapeHtml(displayMsg.substring(0, 8))}</div>
                    <div class="css-hat ${isWinner ? 'special' : ''}"></div>
                    ${accHTML}
                    <img src="${data.photoBase64}" class="santa-img" loading="lazy">
                </div>
                <div class="santa-name">${escapeHtml(data.name)}</div>
                <div class="click-badge">👍 ${data.clickCount || 0}</div>
            `;
        }

        function renderPlaza() {
            if (!db) return;
            db.collection('santas').onSnapshot(snap => {
                const plaza = document.getElementById('plaza');
                if (snap.empty) { plaza.innerHTML = '<p>掃描加入我們！</p>'; return; }
                
                snap.docChanges().forEach(change => {
                    const data = change.doc.data();
                    const id = change.doc.id;
                    if (change.type === 'added' || change.type === 'modified') {
                        localDataMap.set(id, { id, ...data });
                        let card = document.getElementById(`santa-${id}`);
                        if (!card) {
                            card = document.createElement('div');
                            card.id = `santa-${id}`;
                            card.onclick = () => handleBufferedPoke(id, card);
                            plaza.appendChild(card);
                        }
                        const accId = data.accessoryId || 'none';
                        card.className = `santa-card ${accId === 'gold' ? 'gold-mode' : ''} ${accId !== 'none' ? 'has-accessory' : ''}`;
                        // 只在有重大變化或讚數變多時更新內容
                        card.querySelector('.click-badge') ? card.querySelector('.click-badge').innerText = `👍 ${data.clickCount}` : card.innerHTML = generateCardHTML(data, false);
                    } else if (change.type === 'removed') {
                        localDataMap.delete(id);
                        document.getElementById(`santa-${id}`)?.remove();
                    }
                });
                sortCards();
            });
        }

        function sortCards() {
            const plaza = document.getElementById('plaza');
            const sorted = Array.from(localDataMap.values()).sort((a, b) => (b.clickCount || 0) - (a.clickCount || 0));
            if (sorted.length === 0) return;
            const winnerId = sorted[0].id;
            const fragment = document.createDocumentFragment();
            sorted.forEach(data => {
                const card = document.getElementById(`santa-${data.id}`);
                if (card) {
                    const isWinner = data.id === winnerId;
                    if (card.dataset.winner !== String(isWinner)) {
                        card.dataset.winner = isWinner;
                        card.innerHTML = generateCardHTML(data, isWinner);
                    }
                    fragment.appendChild(card);
                }
            });
            plaza.appendChild(fragment);
        }

        // 特效啟動
        function triggerDiscoEffect() {
            document.body.classList.add('disco-mode');
            const bgm = document.getElementById('bgm');
            bgm.playbackRate = 1.25;
            setTimeout(() => {
                document.body.classList.remove('disco-mode');
                bgm.playbackRate = 1.0;
            }, 5000);
        }

        // 初始化
        new SnowSystem();
        renderPlaza();
        
        // QR Code 初始化
        const uploadUrl = window.location.href.split('?')[0] + '?mode=upload';
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(uploadUrl)}`;
        if (new URLSearchParams(window.location.search).get('mode') === 'upload') switchMode('upload');
    </script>
</body>
